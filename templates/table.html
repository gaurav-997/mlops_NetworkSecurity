<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Results - Network Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .results-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        
        .table-responsive {
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            font-size: 14px;
        }
        
        thead th {
            background-color: #667eea !important;
            color: white !important;
            border: none !important;
            padding: 12px !important;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        tbody tr:hover {
            background-color: #f8f9fa;
        }
        
        tbody td {
            padding: 10px !important;
            border-bottom: 1px solid #dee2e6 !important;
        }
        
        .predicted_column {
            font-weight: bold;
        }
        
        tr td:last-child {
            background-color: #fff3cd;
            font-weight: bold;
        }
        
        .summary {
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
        }
        
        .summary h3 {
            color: #0c4a6e;
            margin-bottom: 15px;
        }
        
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-box h4 {
            font-size: 2em;
            margin: 0;
            color: #667eea;
        }
        
        .stat-box p {
            margin: 5px 0 0 0;
            color: #666;
            font-weight: 600;
        }
        
        .btn-back {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s;
            border: none;
            font-weight: bold;
        }
        
        .btn-back:hover {
            background: #5568d3;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }
        
        .download-btn {
            background: #10b981;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            margin-left: 10px;
            transition: all 0.3s;
            border: none;
            font-weight: bold;
        }
        
        .download-btn:hover {
            background: #059669;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Prediction Results</h1>
            <p>Network Security Phishing Detection</p>
        </div>
        
        <div class="results-container">
            <div class="summary">
                <h3>📊 Prediction Summary</h3>
                <div class="summary-stats" id="summaryStats">
                    <!-- Summary will be populated by JavaScript -->
                </div>
            </div>
            
            <h3>📋 Detailed Results</h3>
            <div class="table-responsive">
                {{ table|safe }}
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="/docs" class="btn-back">← Back to API Docs</a>
                <a href="/prediction_output/output.csv" class="download-btn" download>📥 Download CSV</a>
            </div>
        </div>
    </div>
    
    <script>
        // Calculate and display summary statistics
        window.addEventListener('DOMContentLoaded', () => {
            const table = document.querySelector('table');
            if (!table) return;
            
            const rows = table.querySelectorAll('tbody tr');
            let totalSamples = rows.length;
            let phishingCount = 0;
            let legitimateCount = 0;
            
            // Find the predicted_column index
            const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
            const predictedColIndex = headers.indexOf('predicted_column');
            
            if (predictedColIndex !== -1) {
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    const predictedValue = cells[predictedColIndex]?.textContent.trim();
                    
                    if (predictedValue === '1') {
                        phishingCount++;
                        cells[predictedColIndex].style.color = '#dc2626';
                        cells[predictedColIndex].textContent = '🚨 Phishing (1)';
                    } else if (predictedValue === '-1' || predictedValue === '0') {
                        legitimateCount++;
                        cells[predictedColIndex].style.color = '#10b981';
                        cells[predictedColIndex].textContent = '✅ Legitimate (' + predictedValue + ')';
                    }
                });
            }
            
            // Display summary
            const summaryHTML = `
                <div class="stat-box">
                    <h4>${totalSamples}</h4>
                    <p>Total Samples</p>
                </div>
                <div class="stat-box">
                    <h4 style="color: #dc2626;">${phishingCount}</h4>
                    <p>Phishing Detected (${(phishingCount/totalSamples*100).toFixed(1)}%)</p>
                </div>
                <div class="stat-box">
                    <h4 style="color: #10b981;">${legitimateCount}</h4>
                    <p>Legitimate (${(legitimateCount/totalSamples*100).toFixed(1)}%)</p>
                </div>
            `;
            
            document.getElementById('summaryStats').innerHTML = summaryHTML;
        });
    </script>
</body>
</html>

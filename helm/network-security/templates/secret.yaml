apiVersion: v1
kind: Secret
metadata:
  name: {{ include "network-security.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "network-security.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{- if $value }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "network-security.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "network-security.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}

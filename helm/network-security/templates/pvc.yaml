{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "network-security.fullname" . }}-model-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "network-security.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.modelData.accessMode }}
  storageClassName: {{ .Values.persistence.modelData.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.modelData.size }}


# Override values for staging environment
replicaCount: 2

image:
  tag: "staging"

env:
  APP_ENV: staging
  LOG_LEVEL: DEBUG

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

ingress:
  enabled: true
  hosts:
    - host: api-staging.network-security.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: network-security-staging-tls
      hosts:
        - api-staging.network-security.example.com

persistence:
  modelData:
    size: 5Gi
  feedbackData:
    size: 2Gi
  trainingData:
    size: 10Gi

training:
  enabled: false  # Disable scheduled training in staging

# Default values for network-security Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# ============================================
# Global Settings
# ============================================
global:
  environment: production

# ============================================
# Image Configuration
# ============================================
image:
  registry: docker.io
  repository: your-username/network-security
  tag: "latest"
  pullPolicy: Always
  pullSecrets: []

# ============================================
# Deployment Configuration
# ============================================
replicaCount: 3

nameOverride: ""
fullnameOverride: ""

# ============================================
# Service Account
# ============================================
serviceAccount:
  create: true
  annotations:
    # AWS IRSA annotation
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/network-security-pod-role
  name: ""

# ============================================
# Pod Configuration
# ============================================
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# ============================================
# Service Configuration
# ============================================
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

# ============================================
# Ingress Configuration
# ============================================
ingress:
  enabled: true
  className: alb  # or nginx
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Add your certificate ARN
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account:certificate/id
  hosts:
    - host: api.network-security.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: network-security-tls
      hosts:
        - api.network-security.example.com

# ============================================
# Resources
# ============================================
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# ============================================
# Autoscaling
# ============================================
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30

# ============================================
# Probes
# ============================================
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

# ============================================
# Volumes and Persistence
# ============================================
persistence:
  enabled: true
  modelData:
    storageClass: efs-sc
    accessMode: ReadWriteMany
    size: 10Gi
  feedbackData:
    storageClass: efs-sc
    accessMode: ReadWriteMany
    size: 5Gi
  trainingData:
    storageClass: efs-sc
    accessMode: ReadWriteMany
    size: 20Gi

# ============================================
# Environment Variables
# ============================================
env:
  APP_ENV: production
  HOST: "0.0.0.0"
  PORT: "8000"
  WORKERS: "4"
  AWS_REGION: us-east-1
  MODEL_BUCKET: network-security-models
  TRAINING_BUCKET_NAME: networksecurity
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MLFLOW_EXPERIMENT_NAME: network-security-production
  REDIS_URL: redis://redis:6379/0
  PROMETHEUS_ENABLED: "true"
  LOG_LEVEL: INFO

# Secrets (use external-secrets operator in production)
secrets:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  MLFLOW_TRACKING_USERNAME: ""
  MLFLOW_TRACKING_PASSWORD: ""
  SLACK_WEBHOOK_URL: ""

# ============================================
# Redis Configuration
# ============================================
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: gp3
    size: 5Gi

# ============================================
# Monitoring
# ============================================
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s
  prometheusRule:
    enabled: true

# ============================================
# Training CronJob
# ============================================
training:
  enabled: true
  schedule: "0 2 * * 0"  # Every Sunday at 2 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  resources:
    requests:
      cpu: 2000m
      memory: 8Gi
    limits:
      cpu: 4000m
      memory: 16Gi

# ============================================
# Node Selector and Affinity
# ============================================
nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - network-security-api
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app: network-security-api

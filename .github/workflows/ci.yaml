name: CI - Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  
jobs:
  # ============================================
  # Job 1: Code Quality & Linting
  # ============================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort mypy
          pip install -r requirements.txt
      
      - name: Run Black (Code Formatting)
        run: |
          black --check --diff networksecurity/ || echo "Black formatting issues found"
        continue-on-error: true
      
      - name: Run isort (Import Sorting)
        run: |
          isort --check-only --diff networksecurity/ || echo "Import sorting issues found"
        continue-on-error: true
      
      - name: Run Flake8 (Linting)
        run: |
          flake8 networksecurity/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 networksecurity/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run Pylint
        run: |
          pylint networksecurity/ --fail-under=7.0 || echo "Pylint score below threshold"
        continue-on-error: true

  # ============================================
  # Job 2: Unit Tests
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install -r requirements.txt
          pip install -e .
      
      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=networksecurity --cov-report=xml --cov-report=html
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  # ============================================
  # Job 3: Security Scanning
  # ============================================
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
          pip install -r requirements.txt
      
      - name: Run Safety (Dependency Vulnerability Check)
        run: |
          safety check --json || echo "Vulnerabilities found in dependencies"
        continue-on-error: true
      
      - name: Run Bandit (Security Issues in Code)
        run: |
          bandit -r networksecurity/ -f json -o bandit-report.json || true
          cat bandit-report.json
        continue-on-error: true

  # ============================================
  # Job 4: Build & Test Docker Image
  # ============================================
  docker-build-test:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [unit-tests, security-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: network-security:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image (API mode)
        run: |
          docker run -d --name test-api -p 8000:8000 \
            -e AWS_ACCESS_KEY_ID=test \
            -e AWS_SECRET_ACCESS_KEY=test \
            network-security:test api
          sleep 10
          curl -f http://localhost:8000/health || echo "Health check failed"
          docker logs test-api
          docker stop test-api
        continue-on-error: true

  # ============================================
  # Job 5: Integration Tests
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
          pip install -r requirements.txt
          pip install -e .
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v || echo "Integration tests not found"
        continue-on-error: true

  # ============================================
  # Job 6: CI Summary
  # ============================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, security-scan, docker-build-test, integration-tests]
    if: always()
    
    steps:
      - name: Check CI Status
        run: |
          echo "=========================================="
          echo "CI Pipeline Summary"
          echo "=========================================="
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Docker Build: ${{ needs.docker-build-test.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "=========================================="
          
          if [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.docker-build-test.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline FAILED"
            exit 1
          else
            echo "✅ CI Pipeline PASSED"
          fi

name: Training Pipeline - Scheduled & Drift-Triggered

on:
  # Scheduled training (weekly)
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM UTC
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      training_type:
        description: 'Training Type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental
          - retrain
      reason:
        description: 'Training Reason'
        required: false
        default: 'Manual trigger'
  
  # Webhook trigger from Grafana/Alertmanager (drift alert)
  repository_dispatch:
    types: [drift-alert, data-change, manual-training]
  
  # Trigger on data changes (DVC)
  push:
    paths:
      - 'Network_data/**'
      - 'data/**'
      - '*.dvc'

env:
  PYTHON_VERSION: '3.10'
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  DVC_REMOTE: s3
  
jobs:
  # ============================================
  # Job 1: Check if Training is Needed
  # ============================================
  check-training-needed:
    name: Check Training Conditions
    runs-on: ubuntu-latest
    outputs:
      should_train: ${{ steps.check.outputs.should_train }}
      training_reason: ${{ steps.check.outputs.reason }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc[s3] boto3 requests
          pip install -r requirements.txt
          pip install -e .
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Pull latest data with DVC
        run: |
          dvc remote modify s3_remote access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          dvc remote modify s3_remote secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          dvc pull || echo "No DVC data to pull"
        continue-on-error: true
      
      - name: Check training conditions
        id: check
        run: |
          echo "Checking if training is needed..."
          
          SHOULD_TRAIN="false"
          REASON="No training needed"
          
          # Check for manual trigger
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_TRAIN="true"
            REASON="${{ github.event.inputs.reason }}"
          
          # Check for drift alert webhook
          elif [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            SHOULD_TRAIN="true"
            REASON="Drift alert triggered: ${{ github.event.action }}"
          
          # Check for data changes
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            SHOULD_TRAIN="true"
            REASON="Data files changed"
          
          # Check for scheduled run
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            SHOULD_TRAIN="true"
            REASON="Scheduled weekly training"
          
          # Check feedback data conditions
          else
            python -c "
from networksecurity.components.feedback_collector import FeedbackCollector
from networksecurity.pipeline.retraining_config import RetrainingConfig

try:
    collector = FeedbackCollector()
    config = RetrainingConfig()
    
    should_retrain = collector.should_trigger_retraining(
        min_samples=config.min_retraining_samples,
        min_accuracy_drop=config.accuracy_drop_threshold
    )
    
    if should_retrain:
        print('SHOULD_TRAIN=true')
        print('REASON=Feedback thresholds met')
    else:
        print('SHOULD_TRAIN=false')
        print('REASON=No training needed')
except Exception as e:
    print(f'Error checking conditions: {e}')
    print('SHOULD_TRAIN=false')
    print('REASON=Error checking conditions')
" > conditions.txt
            
            source conditions.txt
          fi
          
          echo "should_train=$SHOULD_TRAIN" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "Training needed: $SHOULD_TRAIN (Reason: $REASON)"

  # ============================================
  # Job 2: Run Training Pipeline
  # ============================================
  run-training:
    name: Execute Training Pipeline
    runs-on: ubuntu-latest
    needs: check-training-needed
    if: needs.check-training-needed.outputs.should_train == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for DVC
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Setup DVC
        run: |
          dvc remote modify s3_remote access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          dvc remote modify s3_remote secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          dvc pull || echo "No DVC data to pull"
        continue-on-error: true
      
      - name: Setup MLflow
        run: |
          echo "MLflow tracking URI: $MLFLOW_TRACKING_URI"
          export MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}
          export MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      
      - name: Run training pipeline
        id: training
        run: |
          echo "=========================================="
          echo "Starting Training Pipeline"
          echo "Reason: ${{ needs.check-training-needed.outputs.training_reason }}"
          echo "=========================================="
          
          # Set training parameters
          export TRAINING_TYPE="${{ github.event.inputs.training_type }}"
          export TRAINING_REASON="${{ needs.check-training-needed.outputs.training_reason }}"
          export MLFLOW_EXPERIMENT_NAME="network-security-production"
          export MLFLOW_RUN_NAME="training-$(date +%Y%m%d-%H%M%S)"
          
          # Run training
          python main.py 2>&1 | tee training.log
          
          # Extract training metrics
          ACCURACY=$(grep -oP "Final Accuracy: \K[0-9.]+" training.log || echo "N/A")
          F1_SCORE=$(grep -oP "F1 Score: \K[0-9.]+" training.log || echo "N/A")
          
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT
          echo "f1_score=$F1_SCORE" >> $GITHUB_OUTPUT
          
          echo "Training completed successfully!"
      
      - name: Run model validation tests
        run: |
          echo "Running model validation tests..."
          python -c "
from networksecurity.pipeline.training_pipeline import TrainingPipeline
import pickle
import os

# Load trained model
model_path = 'final_model/model.pkl'
if os.path.exists(model_path):
    with open(model_path, 'rb') as f:
        model = pickle.load(f)
    print('✅ Model loaded successfully')
    
    # Basic validation
    import numpy as np
    test_input = np.random.rand(1, 10)  # Adjust dimensions as needed
    prediction = model.predict(test_input)
    print(f'✅ Model prediction test passed: {prediction}')
else:
    print('❌ Model file not found')
    exit(1)
"
      
      - name: Push artifacts to DVC
        run: |
          dvc add final_model/
          dvc push || echo "DVC push failed"
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add final_model.dvc .gitignore
          git commit -m "Update model artifacts [skip ci]" || echo "No changes to commit"
          git push || echo "Git push failed"
        continue-on-error: true
      
      - name: Update model registry
        run: |
          echo "Updating model registry..."
          
          # Register model in MLflow
          python -c "
import mlflow
import os
from datetime import datetime

mlflow.set_tracking_uri('${{ env.MLFLOW_TRACKING_URI }}')
mlflow.set_experiment('network-security-production')

# Log model metadata
with mlflow.start_run(run_name='model-registration-$(date +%Y%m%d-%H%M%S)'):
    mlflow.log_param('training_reason', '${{ needs.check-training-needed.outputs.training_reason }}')
    mlflow.log_param('git_commit', '${{ github.sha }}')
    mlflow.log_param('triggered_by', '${{ github.event_name }}')
    mlflow.log_metric('accuracy', float('${{ steps.training.outputs.accuracy }}' or 0))
    mlflow.log_metric('f1_score', float('${{ steps.training.outputs.f1_score }}' or 0))
    
    # Log model artifact
    if os.path.exists('final_model/model.pkl'):
        mlflow.log_artifact('final_model/model.pkl')
    
    print('✅ Model registered in MLflow')
" || echo "MLflow registration failed"
        continue-on-error: true
      
      - name: Upload training artifacts
        uses: actions/upload-artifact@v3
        with:
          name: training-artifacts
          path: |
            final_model/
            training.log
            artifacts/
          retention-days: 30
      
      - name: Send training notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ACCURACY="${{ steps.training.outputs.accuracy }}"
          F1_SCORE="${{ steps.training.outputs.f1_score }}"
          REASON="${{ needs.check-training-needed.outputs.training_reason }}"
          
          if [ "$STATUS" == "success" ]; then
            MESSAGE="✅ Training Pipeline Successful!\nReason: $REASON\nAccuracy: $ACCURACY\nF1 Score: $F1_SCORE\nCommit: ${{ github.sha }}"
          else
            MESSAGE="❌ Training Pipeline Failed!\nReason: $REASON\nCommit: ${{ github.sha }}"
          fi
          
          # Send to Slack
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MESSAGE\"}" || echo "Slack notification failed"
        continue-on-error: true

  # ============================================
  # Job 3: Evaluate Model Performance
  # ============================================
  evaluate-model:
    name: Model Evaluation
    runs-on: ubuntu-latest
    needs: run-training
    outputs:
      approved: ${{ steps.evaluate.outputs.approved }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      
      - name: Download training artifacts
        uses: actions/download-artifact@v3
        with:
          name: training-artifacts
      
      - name: Evaluate model
        id: evaluate
        run: |
          echo "Evaluating model performance..."
          
          python -c "
import pickle
import os
import numpy as np
from sklearn.metrics import accuracy_score, f1_score, precision_score, recall_score

# Load model
model_path = 'final_model/model.pkl'
if not os.path.exists(model_path):
    print('❌ Model file not found')
    exit(1)

with open(model_path, 'rb') as f:
    model = pickle.load(f)

# Define acceptance criteria
MIN_ACCURACY = 0.75
MIN_F1_SCORE = 0.70

# Simulate evaluation (replace with actual test data)
print('Model evaluation completed')
print(f'Minimum accuracy threshold: {MIN_ACCURACY}')
print(f'Minimum F1 score threshold: {MIN_F1_SCORE}')

# For now, approve automatically (implement actual evaluation logic)
APPROVED = 'true'
print(f'Model approval status: {APPROVED}')

# Write to output
with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
    f.write(f'approved={APPROVED}\n')
" || echo "approved=false" >> $GITHUB_OUTPUT
      
      - name: Create evaluation report
        run: |
          echo "# Model Evaluation Report" > evaluation_report.md
          echo "" >> evaluation_report.md
          echo "**Training Reason:** ${{ needs.check-training-needed.outputs.training_reason }}" >> evaluation_report.md
          echo "**Git Commit:** ${{ github.sha }}" >> evaluation_report.md
          echo "**Approved:** ${{ steps.evaluate.outputs.approved }}" >> evaluation_report.md
          
          cat evaluation_report.md
      
      - name: Upload evaluation report
        uses: actions/upload-artifact@v3
        with:
          name: evaluation-report
          path: evaluation_report.md

  # ============================================
  # Job 4: Deploy Model (if approved)
  # ============================================
  deploy-model:
    name: Deploy Trained Model
    runs-on: ubuntu-latest
    needs: [run-training, evaluate-model]
    if: needs.evaluate-model.outputs.approved == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Download training artifacts
        uses: actions/download-artifact@v3
        with:
          name: training-artifacts
      
      - name: Upload model to S3
        run: |
          echo "Uploading model to S3..."
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          aws s3 cp final_model/model.pkl \
            s3://${{ secrets.MODEL_BUCKET }}/models/network-security-model-${TIMESTAMP}.pkl
          
          # Update latest model pointer
          aws s3 cp final_model/model.pkl \
            s3://${{ secrets.MODEL_BUCKET }}/models/network-security-model-latest.pkl
          
          echo "✅ Model uploaded to S3"
      
      - name: Trigger CD pipeline
        run: |
          echo "Triggering CD pipeline for deployment..."
          
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "model-ready", "client_payload": {"sha": "${{ github.sha }}"}}'
      
      - name: Send deployment notification
        run: |
          MESSAGE="🚀 New model deployed!\nCommit: ${{ github.sha }}\nReason: ${{ needs.check-training-needed.outputs.training_reason }}"
          
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MESSAGE\"}" || echo "Slack notification failed"
        continue-on-error: true

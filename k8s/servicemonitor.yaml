# ServiceMonitor for Prometheus Operator
# Automatically discovers and scrapes metrics from the service
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: network-security-api-metrics
  namespace: network-security
  labels:
    app: network-security-api
    release: prometheus  # Must match Prometheus Operator release label
spec:
  selector:
    matchLabels:
      app: network-security-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      scheme: http
  namespaceSelector:
    matchNames:
      - network-security

---
# PodMonitor (alternative to ServiceMonitor)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: network-security-api-pods
  namespace: network-security
  labels:
    app: network-security-api
spec:
  selector:
    matchLabels:
      app: network-security-api
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s

---
# PrometheusRule for alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: network-security-alerts
  namespace: network-security
  labels:
    app: network-security-api
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: network-security-api
      interval: 30s
      rules:
        # High error rate alert
        - alert: HighErrorRate
          expr: |
            rate(model_errors_total[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value }} errors/sec for {{ $labels.model_version }}"
        
        # High prediction latency
        - alert: HighPredictionLatency
          expr: |
            histogram_quantile(0.99, rate(model_prediction_latency_seconds_bucket[5m])) > 1.0
          for: 5m
          labels:
            severity: warning
            component: api
          annotations:
            summary: "High prediction latency detected"
            description: "P99 latency is {{ $value }}s"
        
        # Data drift detected
        - alert: DataDriftDetected
          expr: |
            max(model_drift_score) > 0.5
          for: 10m
          labels:
            severity: critical
            component: model
          annotations:
            summary: "Significant data drift detected"
            description: "Drift score is {{ $value }} (threshold: 0.5)"
        
        # Low accuracy
        - alert: ModelAccuracyDrop
          expr: |
            model_rolling_accuracy < 0.70
          for: 15m
          labels:
            severity: critical
            component: model
          annotations:
            summary: "Model accuracy has dropped"
            description: "Rolling accuracy is {{ $value }} (threshold: 0.70)"
        
        # API down
        - alert: APIDown
          expr: |
            up{job="network-security-api"} == 0
          for: 2m
          labels:
            severity: critical
            component: api
          annotations:
            summary: "API is down"
            description: "Network Security API is not responding"
        
        # High pod restart rate
        - alert: HighPodRestartRate
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="network-security"}[15m]) > 0.1
          for: 5m
          labels:
            severity: warning
            component: infrastructure
          annotations:
            summary: "High pod restart rate"
            description: "Pod {{ $labels.pod }} is restarting frequently"
        
        # Resource constraints
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="network-security",pod=~"network-security-api.*"}[5m])) by (pod) > 1.5
          for: 10m
          labels:
            severity: warning
            component: infrastructure
          annotations:
            summary: "High CPU usage"
            description: "Pod {{ $labels.pod }} CPU usage is {{ $value }}"
        
        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="network-security",pod=~"network-security-api.*"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace="network-security",pod=~"network-security-api.*"}) by (pod) > 0.9
          for: 10m
          labels:
            severity: warning
            component: infrastructure
          annotations:
            summary: "High memory usage"
            description: "Pod {{ $labels.pod }} memory usage is {{ $value | humanizePercentage }}"

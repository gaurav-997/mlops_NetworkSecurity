# Service Account with IAM Role for Service Accounts (IRSA) for AWS
apiVersion: v1
kind: ServiceAccount
metadata:
  name: network-security-sa
  namespace: network-security
  annotations:
    # AWS IRSA annotation - replace with your IAM role ARN
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/network-security-pod-role
  labels:
    app: network-security-api

---
# ClusterRole for accessing K8s resources (if needed)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: network-security-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: network-security-rolebinding
subjects:
  - kind: ServiceAccount
    name: network-security-sa
    namespace: network-security
roleRef:
  kind: ClusterRole
  name: network-security-role
  apiGroup: rbac.authorization.k8s.io

---
# Service for API
apiVersion: v1
kind: Service
metadata:
  name: network-security-api
  namespace: network-security
  labels:
    app: network-security-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: network-security-api
  sessionAffinity: None

---
# Headless service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: network-security-api-headless
  namespace: network-security
  labels:
    app: network-security-api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: network-security-api

---
# Service for Redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: network-security
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: redis

# Kubernetes Secret - Base64 encoded values
# To create secret from .env file:
# kubectl create secret generic network-security-secrets --from-env-file=.env -n network-security

apiVersion: v1
kind: Secret
metadata:
  name: network-security-secrets
  namespace: network-security
  labels:
    app: network-security-api
type: Opaque
stringData:
  # AWS Credentials (replace with actual values or use external secrets)
  AWS_ACCESS_KEY_ID: "your_aws_access_key_id"
  AWS_SECRET_ACCESS_KEY: "your_aws_secret_access_key"
  
  # MLflow Credentials
  MLFLOW_TRACKING_USERNAME: "mlflow_user"
  MLFLOW_TRACKING_PASSWORD: "mlflow_password"
  
  # Slack Webhook
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  
  # Database credentials (if using PostgreSQL)
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "changeme"
  
  # Note: In production, use External Secrets Operator or AWS Secrets Manager
  # Example with External Secrets:
  # externalsecrets.io/backend: aws-secretsmanager
